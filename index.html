<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In PluralSight</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section id = "left-section">

        <header id="logo-lookup">
            <img src = "" alt = "logo" id = "logo-img">
            <h2 id = "company-name">PLURALSIGHT</h2>
        </header>

        <main>
            <div class="top-container">
                <form>
                    <label for="username-or-email">Username or Email</label>
                    <input type = "text" id = "username-or-email" required>

                    <label for="password">Password</label>
                    <input type = "password" id="password" minlength="8" required>

                    <input type = "submit" value="Sign In">
                </form>
                <ul>
                    <li>Forgot Password</li>
                    <li>Sign in with company or school</li>
                </ul>
            </div>
            <div class="bottom-container">
                <div id="divider">
                    <span>OR</span>
                </div>
                <button>Create an account</button>
            </div>
        </main>

        <footer>
            <p>Copyright &copy; 2026 Abdelrahman-2006 All Rights are reserved</p>
            <ul>
                <li>Terms of use</li>
                <li>Privacy Policy</li>
            </ul>
        </footer>
        
    </section>
    <section id = "right-section">
        <div class="right-container">
            <h2 id="quote">Let's create the future together</h2>
            <button id="free-trial">Start a FREE 10-day-trial</button>
        </div>
    </section>
</body>
</html>
