<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In PluralSprite</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section id = "left-section">

        <header id="logo-lookup">
            <img src = "images/Logo.png" alt = "logo" id = "logo-img">
            <h2 id = "company-name">PLURALSPRITE</h2>
        </header>

        <main>
            <div class="top-container">
                <form>
                    <div class="form-container">
                        <label for="username-or-email">Username or Email</label>
                        <input type = "text" id = "username-or-email">
                    </div>
                    <div class="form-container">
                        <label for="password">Password</label>
                        <input type = "password" id="password" minlength="8">
                    </div>

                    <input type = "submit" value="Sign In">
                </form>
                <ul id="sign-in-links">
                    <li>
                        <a href="#">Forgot Password</a>
                    </li>
                    <li>
                        <a href="#">Sign in with company or school</a>
                    </li>
                </ul>
            </div>
            <div class="bottom-container">
                <div id="divider">
                    <span>OR</span>
                </div>
                <button>Create an account</button>
            </div>
        </main>

        <footer>
            <p>
                Copyright &copy; 2026 Abdelrahman-2006
                <a href="https://github.com/abdelrahman-2006"><i class="fa-brands fa-github"></i></a>
                All Rights are reserved</p>
            <ul>
                    <a href="#">Terms of Use</a>
                </li>
                <div id="divide"></div>
                <li>
                    <a href="#">Privacy Policy</a>
                </li>
            </ul>
        </footer>
        
    </section>
    <section id = "right-section">
        <div class="layer">
            <div class="right-container">
                <h2 id="quote">Let's create the future together</h2>
                <button id="free-trial">Start a FREE 10-day-trial</button>
            </div>
        </div>
    </section>
</body>
</html>
